<!DOCTYPE html>
   <html>
      <head>
        <title>Tabla con colspan y rowspan</title>
      </head>
   <body>
      <table border="1">
     <tr>
         <th colspan="3">Horario de Clases</th>
     </tr>
    
      <tr>
     <th>Día</th>
                 <th>Materia</th>
                 <th>Horario</th>
      </tr>

      <tr>
         <td rowspan="2">Lunes</td>
         <td>Programación</td>
         <td>8:00 - 10:00</td>
       
       </tr>

        <tr>
          <td>Base de Datos</td>
          <td>10:00 - 12:00</td>

         </tr>
        
          <tr>
          <td>Martes</td>
          <td colspan="1">Proyecto Integrador</td>
          <td>12:00 - 1:00</td>
         </tr>
        
          <tr>
          <td colspan="3" style="text-align:center">RECESO</td>
         </tr>

        
          <tr>
          <td>Miercoles</td>
          <td>codifiaca</td>
          <td>7:00 - 8:00</td>
         </tr>
       
          <tr>
          <td>Jueves</td>
          <td colspan="1">matematicas</td>
          <td>9:00 - 10:00</td>
         </tr>












 </table>
   </body>
      </html>
